nelmio_cors:
    defaults:
        allow_credentials: true
        allow_origin: ["http://localhost:5173"]
        allow_headers:
            [
                "Content-Type",
                "Authorization",
                "X-Requested-With",
                "Accept",
                "Origin",
            ]
        allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
        max_age: 3600

    paths:
        "^/api/":
            allow_origin: ["http://localhost:5173"]
            allow_headers:
                [
                    "Content-Type",
                    "Authorization",
                    "X-Requested-With",
                    "Accept",
                    "Origin",
                ]
            allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allow_credentials: true
            max_age: 3600
